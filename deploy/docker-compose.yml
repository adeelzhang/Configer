version: '3.8'

services:
  configer-api:
    build:
      context: ..
      dockerfile: deploy/api.Dockerfile
    container_name: configer-api
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - PORT=8788
      - DATA_DIR=/data
      - API_KEY=${API_KEY:-configer-default-key}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD:-admin123}
    volumes:
      - ../data:/data
    networks:
      - configer-network
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:8788/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  configer-web:
    build:
      context: ..
      dockerfile: deploy/web.Dockerfile
    container_name: configer-web
    restart: unless-stopped
    ports:
      - "8080:80"
    depends_on:
      - configer-api
    networks:
      - configer-network

networks:
  configer-network:
    driver: bridge
